<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Shred Run: Freeride MTB</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #090d16;
      overscroll-behavior: none;
    }
    body { display: flex; }

    .gameShell {
      position: relative;
      flex: 1;
      display: grid;
      place-items: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    canvas {
      width: 100vw;
      height: 100%;
      max-height: 100vh;
      display: block;
      touch-action: none;
      user-select: none;
      background: linear-gradient(#1e3552 0%, #3d5a7a 40%, #667a8f 58%, #6d6759 59%, #6d6759 100%);
    }

    .hud {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 10px);
      left: calc(env(safe-area-inset-left) + 10px);
      right: calc(env(safe-area-inset-right) + 10px);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
    }

    .pill {
      background: rgba(8, 13, 22, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      color: #e9f1ff;
      backdrop-filter: blur(3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.26);
      white-space: nowrap;
    }

    .right { display: flex; gap: 8px; }

    .controls {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom) + 14px);
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
    }

    .btn {
      pointer-events: auto;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      min-width: 138px;
      font-weight: 760;
      font-size: 15px;
      background: #2c93ff;
      color: #fff;
      box-shadow: 0 14px 28px rgba(17, 123, 230, 0.4);
    }
    .btn.secondary {
      background: rgba(255, 255, 255, 0.88);
      color: #0f1728;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.35);
    }

    .hint {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom) + 78px);
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      pointer-events: none;
      display: none;
    }

    @media (min-width: 800px) {
      canvas { width: min(980px, 100vw); border-radius: 16px; }
      .hint { display: block; }
    }
  </style>
</head>
<body>
  <div class="gameShell">
    <canvas id="game" aria-label="Freeride MTB game"></canvas>

    <div class="hud">
      <div class="pill"><b>Score:</b> <span id="score">0</span> &nbsp;|&nbsp; <b>Combo:</b> <span id="combo">x1</span></div>
      <div class="right">
        <div class="pill"><b>Tricks:</b> <span id="tricks">0</span></div>
        <div class="pill"><b>Best:</b> <span id="best">0</span></div>
      </div>
    </div>

    <div class="hint">Tap once = Jump • Double tap fast = Trick jump</div>

    <div class="controls">
      <button class="btn secondary" id="restart">Restart</button>
      <button class="btn" id="jumpBtn">JUMP / TRICK</button>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha: true });

  const ui = {
    score: document.getElementById("score"),
    combo: document.getElementById("combo"),
    tricks: document.getElementById("tricks"),
    best: document.getElementById("best"),
    restart: document.getElementById("restart"),
    jump: document.getElementById("jumpBtn")
  };

  const WORLD = { w: 960, h: 420 };
  const GROUND_Y = 320;
  const CONFIG = {
    gravity: 2200,
    jumpVelocity: 850,
    baseSpeed: 355,
    speedGrow: 14,
    spawnMin: 0.7,
    spawnMax: 1.35,
    doubleTapMs: 260,
    hazards: {
      stone: 0.45,
      jump: 0.3,
      gap: 0.25
    },
    trickNames: ["Backflip", "Tailwhip", "Barspin"]
  };

  const STORAGE_KEY = "shred_run_best_v1";
  let best = Number(localStorage.getItem(STORAGE_KEY) || 0);
  ui.best.textContent = best;

  const state = {
    running: false,
    gameOver: false,
    score: 0,
    tricksLanded: 0,
    combo: 1,
    speed: CONFIG.baseSpeed,
    bgNear: 0,
    bgFar: 0,
    spawnTimer: rand(CONFIG.spawnMin, CONFIG.spawnMax),
    lastTick: performance.now(),
    lastTapAt: 0,
    features: [],
    particles: []
  };

  const rider = {
    x: 180,
    y: GROUND_Y - 58,
    w: 112,
    h: 58,
    vy: 0,
    onGround: true,
    airborneTime: 0,
    jumpStartX: 0,
    jumpScored: false,
    trickMode: false,
    trickAngle: 0,
    trickName: "",
    blink: 0
  };

  const rAFResize = () => requestAnimationFrame(resize);
  window.addEventListener("resize", rAFResize);
  window.addEventListener("orientationchange", rAFResize);
  document.addEventListener("touchmove", (e) => e.preventDefault(), { passive: false });

  function resize() {
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    const cssW = window.innerWidth;
    const cssH = window.innerHeight;
    const scale = Math.min(cssW / WORLD.w, cssH / WORLD.h);
    const displayW = Math.floor(WORLD.w * scale);
    const displayH = Math.floor(WORLD.h * scale);

    canvas.style.width = `${displayW}px`;
    canvas.style.height = `${displayH}px`;
    canvas.width = Math.floor(WORLD.w * dpr);
    canvas.height = Math.floor(WORLD.h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function resetGame() {
    state.running = false;
    state.gameOver = false;
    state.score = 0;
    state.combo = 1;
    state.tricksLanded = 0;
    state.speed = CONFIG.baseSpeed;
    state.bgNear = 0;
    state.bgFar = 0;
    state.spawnTimer = rand(CONFIG.spawnMin, CONFIG.spawnMax);
    state.features.length = 0;
    state.particles.length = 0;

    rider.y = GROUND_Y - rider.h;
    rider.vy = 0;
    rider.onGround = true;
    rider.airborneTime = 0;
    rider.jumpStartX = 0;
    rider.jumpScored = false;
    rider.trickMode = false;
    rider.trickAngle = 0;
    rider.trickName = "";

    refreshHud();
    draw();
  }

  function startGame() {
    if (state.gameOver) resetGame();
    state.running = true;
  }

  function refreshHud() {
    ui.score.textContent = Math.floor(state.score);
    ui.combo.textContent = `x${state.combo}`;
    ui.tricks.textContent = state.tricksLanded;
  }

  function handleTap() {
    const now = performance.now();
    const isSecondTap = (now - state.lastTapAt) <= CONFIG.doubleTapMs;
    state.lastTapAt = now;

    if (!state.running && !state.gameOver) startGame();
    if (state.gameOver) {
      resetGame();
      startGame();
      return;
    }

    if (rider.onGround) {
      jump(false);
      if (isSecondTap) doTrick();
      return;
    }

    if (isSecondTap) doTrick();
  }

  function jump(boosted) {
    rider.vy = -CONFIG.jumpVelocity * (boosted ? 1.12 : 1);
    rider.onGround = false;
    rider.airborneTime = 0;
    rider.jumpStartX = rider.x;
    rider.jumpScored = false;
    rider.trickMode = false;
    rider.trickName = "";
    dust(rider.x + 30, GROUND_Y - 4, 16);
  }

  function doTrick() {
    if (rider.onGround || rider.trickMode) return;
    rider.trickMode = true;
    rider.trickAngle = 0;
    rider.trickName = CONFIG.trickNames[Math.floor(Math.random() * CONFIG.trickNames.length)];
    spark(rider.x + rider.w * 0.65, rider.y + rider.h * 0.4, 12, "#bfe8ff");
  }

  function spawnFeature() {
    const roll = Math.random();
    const x = WORLD.w + 60;

    if (roll < CONFIG.hazards.stone) {
      const size = rand(38, 68);
      state.features.push({
        type: "stone",
        x,
        y: GROUND_Y - size + 10,
        w: size * 1.1,
        h: size,
        passed: false
      });
      return;
    }

    if (roll < CONFIG.hazards.stone + CONFIG.hazards.jump) {
      const w = rand(74, 112);
      const h = rand(26, 36);
      state.features.push({
        type: "jump",
        x,
        y: GROUND_Y - h,
        w,
        h,
        used: false
      });
      return;
    }

    const w = rand(90, 150);
    state.features.push({
      type: "gap",
      x,
      y: GROUND_Y,
      w,
      h: WORLD.h - GROUND_Y,
      passed: false
    });
  }

  function aabb(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function riderCollider() {
    return {
      x: rider.x + 18,
      y: rider.y + 8,
      w: rider.w - 40,
      h: rider.h - 14
    };
  }

  function groundContact() {
    rider.y = GROUND_Y - rider.h;
    rider.vy = 0;
    rider.onGround = true;

    if (!rider.jumpScored && rider.airborneTime > 0.18) {
      const airtimePts = Math.floor(rider.airborneTime * 65 * state.combo);
      const distancePts = Math.floor((state.speed * rider.airborneTime) * 0.05);
      state.score += airtimePts + distancePts;
      rider.jumpScored = true;
      state.combo = Math.min(9, state.combo + 1);
      refreshHud();
    }

    if (rider.trickMode) {
      rider.trickMode = false;
      rider.trickAngle = 0;
      state.tricksLanded += 1;
      state.score += 120 * state.combo;
      state.combo = Math.min(9, state.combo + 1);
      spark(rider.x + rider.w * 0.75, rider.y + 12, 18, "#7de7a8");
      refreshHud();
    }
  }

  function crash() {
    state.gameOver = true;
    state.running = false;
    rider.blink = 1.2;
    state.combo = 1;
    dust(rider.x + rider.w * 0.4, rider.y + rider.h, 20);
    if (Math.floor(state.score) > best) {
      best = Math.floor(state.score);
      localStorage.setItem(STORAGE_KEY, String(best));
      ui.best.textContent = best;
    }
    refreshHud();
  }

  function update(dt) {
    if (state.running && !state.gameOver) {
      state.speed = CONFIG.baseSpeed + (state.score / 130) * CONFIG.speedGrow + state.tricksLanded * 2;
      state.bgNear = (state.bgNear + state.speed * 0.24 * dt) % (WORLD.w + 180);
      state.bgFar = (state.bgFar + state.speed * 0.07 * dt) % (WORLD.w + 260);

      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        spawnFeature();
        state.spawnTimer = rand(CONFIG.spawnMin, CONFIG.spawnMax) * clamp(1 - state.score / 2600, 0.5, 1);
      }

      rider.vy += CONFIG.gravity * dt;
      rider.y += rider.vy * dt;
      if (!rider.onGround) rider.airborneTime += dt;
      if (rider.trickMode) rider.trickAngle += dt * 10.5;

      if (rider.y >= GROUND_Y - rider.h) groundContact();
      else rider.onGround = false;

      for (let i = state.features.length - 1; i >= 0; i -= 1) {
        const f = state.features[i];
        f.x -= state.speed * dt;

        if (f.x + f.w < -120) {
          state.features.splice(i, 1);
          continue;
        }

        if (f.type === "stone") {
          if (!f.passed && f.x + f.w < rider.x) {
            f.passed = true;
            state.score += 8;
            refreshHud();
          }
          if (aabb(riderCollider(), f)) crash();
        }

        if (f.type === "jump") {
          const frontWheelX = rider.x + rider.w * 0.8;
          const onTakeoff = rider.onGround && frontWheelX > f.x && frontWheelX < f.x + f.w * 0.65;
          if (onTakeoff && !f.used) {
            f.used = true;
            jump(true);
            state.score += 18;
            refreshHud();
          }
        }

        if (f.type === "gap") {
          const wheelBaseX = rider.x + rider.w * 0.5;
          const insideGap = wheelBaseX > f.x && wheelBaseX < f.x + f.w;
          if (insideGap && rider.onGround) crash();
          if (!f.passed && f.x + f.w < rider.x) {
            f.passed = true;
            state.score += 22;
            refreshHud();
          }
        }
      }
    }

    if (rider.blink > 0) rider.blink -= dt;
    updateParticles(dt);
  }

  function dust(x, y, count = 10) {
    for (let i = 0; i < count; i += 1) {
      const ang = rand(-Math.PI, 0);
      const speed = rand(80, 230);
      state.particles.push({
        x,
        y,
        vx: Math.cos(ang) * speed,
        vy: Math.sin(ang) * speed,
        life: rand(0.28, 0.55),
        color: "rgba(222,207,179,0.8)",
        size: rand(2, 4)
      });
    }
  }

  function spark(x, y, count = 10, color = "#d8efff") {
    for (let i = 0; i < count; i += 1) {
      const ang = rand(-Math.PI * 0.9, Math.PI * 0.1);
      const speed = rand(150, 320);
      state.particles.push({
        x,
        y,
        vx: Math.cos(ang) * speed,
        vy: Math.sin(ang) * speed,
        life: rand(0.35, 0.75),
        color,
        size: rand(2, 3)
      });
    }
  }

  function updateParticles(dt) {
    for (let i = state.particles.length - 1; i >= 0; i -= 1) {
      const p = state.particles[i];
      p.life -= dt;
      if (p.life <= 0) {
        state.particles.splice(i, 1);
        continue;
      }
      p.vy += 1100 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;

      const alpha = clamp(p.life * 1.8, 0, 1);
      ctx.fillStyle = applyAlpha(p.color, alpha);
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, WORLD.w, WORLD.h);
    drawSkyAndMountains();
    drawGround();
    drawFeatures();
    drawRider();
    drawOverlay();
  }

  function drawSkyAndMountains() {
    for (let i = 0; i < 6; i += 1) {
      const x = ((i * 250) - state.bgFar) % (WORLD.w + 300) - 120;
      const h = 120 + (i % 3) * 26;
      mountainPeak(x, 238, 240, h, "rgba(52,72,100,0.42)");
    }

    for (let i = 0; i < 8; i += 1) {
      const x = ((i * 180) - state.bgNear) % (WORLD.w + 240) - 100;
      const h = 150 + (i % 2) * 38;
      mountainPeak(x, 260, 190, h, "rgba(72,77,88,0.62)");
      mountainSnow(x + 95, 260 - h, 45);
    }
  }

  function mountainPeak(x, baseY, width, height, fill) {
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    ctx.lineTo(x + width * 0.45, baseY - height);
    ctx.lineTo(x + width, baseY);
    ctx.closePath();
    ctx.fill();
  }

  function mountainSnow(x, y, s) {
    ctx.fillStyle = "rgba(238,243,255,0.65)";
    ctx.beginPath();
    ctx.moveTo(x - s * 0.5, y + s * 0.75);
    ctx.lineTo(x, y);
    ctx.lineTo(x + s * 0.52, y + s * 0.72);
    ctx.lineTo(x + s * 0.2, y + s * 0.55);
    ctx.lineTo(x - s * 0.2, y + s * 0.55);
    ctx.closePath();
    ctx.fill();
  }

  function drawGround() {
    ctx.fillStyle = "#5e5649";
    ctx.fillRect(0, GROUND_Y, WORLD.w, WORLD.h - GROUND_Y);

    ctx.fillStyle = "rgba(0,0,0,0.14)";
    for (let i = 0; i < 120; i += 1) {
      const x = ((i * 44) + state.bgNear * 0.9) % (WORLD.w + 44) - 22;
      const y = GROUND_Y + 8 + (i % 3) * 12;
      ctx.fillRect(x, y, 5, 3);
    }

    ctx.strokeStyle = "rgba(35,29,22,0.55)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y + 0.5);
    ctx.lineTo(WORLD.w, GROUND_Y + 0.5);
    ctx.stroke();
  }

  function drawFeatures() {
    for (const f of state.features) {
      if (f.type === "stone") drawStone(f);
      if (f.type === "jump") drawJump(f);
      if (f.type === "gap") drawGap(f);
    }
  }

  function drawStone(f) {
    roundRect(f.x, f.y, f.w, f.h, 16, "#5c616b");
    ctx.fillStyle = "rgba(255,255,255,0.16)";
    ctx.fillRect(f.x + 9, f.y + 12, f.w * 0.35, 4);
    ctx.fillRect(f.x + f.w * 0.45, f.y + 20, f.w * 0.28, 4);
  }

  function drawJump(f) {
    ctx.fillStyle = "#7a6043";
    ctx.beginPath();
    ctx.moveTo(f.x, GROUND_Y);
    ctx.lineTo(f.x + f.w, GROUND_Y);
    ctx.lineTo(f.x + f.w * 0.6, f.y);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.14)";
    ctx.beginPath();
    ctx.moveTo(f.x + f.w * 0.6, f.y);
    ctx.lineTo(f.x + f.w * 0.85, GROUND_Y - 5);
    ctx.lineTo(f.x + f.w * 0.9, GROUND_Y - 1);
    ctx.closePath();
    ctx.fill();
  }

  function drawGap(f) {
    ctx.fillStyle = "#2a211b";
    ctx.fillRect(f.x, GROUND_Y, f.w, WORLD.h - GROUND_Y);
    ctx.fillStyle = "rgba(0,0,0,0.33)";
    ctx.fillRect(f.x, GROUND_Y + 4, f.w, 20);
    ctx.strokeStyle = "rgba(0,0,0,0.4)";
    ctx.beginPath();
    ctx.moveTo(f.x, GROUND_Y + 0.5);
    ctx.lineTo(f.x + f.w, GROUND_Y + 0.5);
    ctx.stroke();
  }

  function drawRider() {
    ctx.save();
    const pivotX = rider.x + rider.w * 0.45;
    const pivotY = rider.y + rider.h * 0.5;
    ctx.translate(pivotX, pivotY);
    if (rider.trickMode) {
      ctx.rotate(rider.trickAngle);
    }
    ctx.translate(-pivotX, -pivotY);

    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.ellipse(rider.x + 45, GROUND_Y + 9, 52, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    const wheelY = rider.y + 47;
    drawWheel(rider.x + 20, wheelY);
    drawWheel(rider.x + 88, wheelY);

    ctx.strokeStyle = "#4de2ff";
    ctx.lineWidth = 4;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(rider.x + 20, wheelY);
    ctx.lineTo(rider.x + 47, rider.y + 22);
    ctx.lineTo(rider.x + 72, wheelY);
    ctx.lineTo(rider.x + 88, wheelY);
    ctx.moveTo(rider.x + 47, rider.y + 22);
    ctx.lineTo(rider.x + 86, rider.y + 20);
    ctx.moveTo(rider.x + 50, rider.y + 30);
    ctx.lineTo(rider.x + 39, rider.y + 40);
    ctx.stroke();

    // Fork + rear shock for full suspension look.
    ctx.strokeStyle = "#e9eef7";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(rider.x + 84, rider.y + 20);
    ctx.lineTo(rider.x + 88, wheelY - 6);
    ctx.moveTo(rider.x + 48, rider.y + 24);
    ctx.lineTo(rider.x + 58, rider.y + 40);
    ctx.stroke();

    drawRiderBody();
    ctx.restore();

    if (rider.trickMode && rider.trickName) {
      label(rider.x + 56, rider.y - 20, rider.trickName, "#d9f5ff");
    }
  }

  function drawWheel(x, y) {
    ctx.strokeStyle = "#171b23";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(x, y, 16, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 6; i += 1) {
      const a = i * (Math.PI / 3);
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + Math.cos(a) * 14, y + Math.sin(a) * 14);
      ctx.stroke();
    }
  }

  function drawRiderBody() {
    const x = rider.x;
    const y = rider.y;

    ctx.fillStyle = "#151d31";
    roundRect(x + 52, y + 6, 22, 18, 6, null, true);

    ctx.fillStyle = "#ffb347";
    roundRect(x + 72, y + 7, 9, 24, 5, null, true);

    ctx.fillStyle = "#192540";
    roundRect(x + 60, y + 17, 28, 18, 7, null, true);

    ctx.fillStyle = "#d8e1f3";
    roundRect(x + 66, y + 34, 8, 16, 4, null, true);
    roundRect(x + 82, y + 32, 8, 17, 4, null, true);

    ctx.fillStyle = "#f0a071";
    ctx.beginPath();
    ctx.arc(x + 69, y + 4, 6.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#2c5dff";
    roundRect(x + 62, y - 2, 16, 7, 4, null, true);

    if (rider.blink > 0) {
      ctx.strokeStyle = "#1d1d1d";
      ctx.lineWidth = 1.7;
      ctx.beginPath();
      ctx.moveTo(x + 67, y + 4);
      ctx.lineTo(x + 72, y + 4);
      ctx.stroke();
    } else {
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(x + 69, y + 3, 2, 2);
    }
  }

  function drawOverlay() {
    if (!state.running && !state.gameOver) {
      banner("Tap to start", "Single tap: Bunny hop • Double tap fast: Trick");
    }
    if (state.gameOver) {
      banner("Crash!", "Tap or press jump to restart");
    }
  }

  function banner(title, subtitle) {
    ctx.fillStyle = "rgba(0,0,0,0.46)";
    roundRect(WORLD.w * 0.16, WORLD.h * 0.16, WORLD.w * 0.68, WORLD.h * 0.26, 18, null, true);
    ctx.fillStyle = "#f2f7ff";
    ctx.textAlign = "center";
    ctx.font = "700 34px system-ui, sans-serif";
    ctx.fillText(title, WORLD.w / 2, WORLD.h * 0.29);
    ctx.font = "500 16px system-ui, sans-serif";
    ctx.globalAlpha = 0.95;
    ctx.fillText(subtitle, WORLD.w / 2, WORLD.h * 0.36);
    ctx.globalAlpha = 1;
  }

  function label(x, y, txt, color) {
    ctx.fillStyle = "rgba(0,0,0,0.38)";
    roundRect(x - 44, y - 14, 88, 24, 9, null, true);
    ctx.fillStyle = color;
    ctx.textAlign = "center";
    ctx.font = "700 12px system-ui, sans-serif";
    ctx.fillText(txt, x, y + 2);
  }

  function roundRect(x, y, w, h, r, strokeColor = null, fill = false) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
    if (fill) ctx.fill();
    if (strokeColor) {
      ctx.strokeStyle = strokeColor;
      ctx.stroke();
    }
  }

  function applyAlpha(color, alpha) {
    if (color.startsWith("rgba")) {
      return color.replace(/rgba\(([^)]+),\s*[^)]+\)/, (_, rgb) => {
        const parts = rgb.split(",").slice(0, 3).join(",");
        return `rgba(${parts},${alpha})`;
      });
    }
    if (color.startsWith("#")) {
      const hex = color.slice(1);
      const full = hex.length === 3 ? hex.split("").map((c) => c + c).join("") : hex;
      const r = parseInt(full.slice(0, 2), 16);
      const g = parseInt(full.slice(2, 4), 16);
      const b = parseInt(full.slice(4, 6), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }
    return color;
  }

  function loop(now) {
    const dt = clamp((now - state.lastTick) / 1000, 0, 0.033);
    state.lastTick = now;
    draw();
    update(dt);
    requestAnimationFrame(loop);
  }

  function rand(a, b) { return a + Math.random() * (b - a); }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  canvas.addEventListener("pointerdown", (e) => { e.preventDefault(); handleTap(); }, { passive: false });
  ui.jump.addEventListener("pointerdown", (e) => { e.preventDefault(); handleTap(); }, { passive: false });
  ui.restart.addEventListener("click", () => { resetGame(); startGame(); });

  window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") {
      e.preventDefault();
      handleTap();
    }
    if (e.key.toLowerCase() === "r") {
      resetGame();
      startGame();
    }
  }, { passive: false });

  resize();
  resetGame();
  requestAnimationFrame(loop);
})();
</script>
</body>
