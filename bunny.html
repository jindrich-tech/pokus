<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <!-- Mobile-first: zabrání zoomu při double tapu -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Kralicek: kameny & mrkve (mobile)</title>
  <style>
    :root { color-scheme: light; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b1220;
      overscroll-behavior: none; /* zabrání “pull to refresh” */
    }
    body { display:flex; flex-direction: column; }

    /* Herní plocha přes celou výšku */
    .gameShell{
      position: relative;
      flex: 1;
      display: grid;
      place-items: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    canvas{
      width: 100vw;
      height: 100%;
      max-height: 100vh;
      display:block;
      touch-action: none; /* dùležité: nezoomovat, nescrollovat při tapu */
      user-select: none;
      background: linear-gradient(#cfefff 0%, #e9fbff 60%, #f7f6ef 60%, #f7f6ef 100%);
    }

    /* HUD */
    .hud{
      position:absolute;
      top: calc(env(safe-area-inset-top) + 10px);
      left: calc(env(safe-area-inset-left) + 10px);
      right: calc(env(safe-area-inset-right) + 10px);
      display:flex;
      gap: 8px;
      justify-content: space-between;
      align-items:center;
      pointer-events: none; /* aby šel tap “skrze” HUD do hry */
    }
    .pill{
      pointer-events: none;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
      white-space: nowrap;
    }
    .right{
      display:flex; gap:8px; align-items:center;
    }

    /* Velké mobilní tlaèítko */
    .controls{
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom) + 14px);
      left: 0; right: 0;
      display:flex;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
    }
    .btn{
      pointer-events: auto;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      min-width: 140px;
      font-weight: 750;
      font-size: 16px;
      background: #1f7aff;
      color: #fff;
      box-shadow: 0 16px 28px rgba(31,122,255,.28);
    }
    .btn:active{ transform: translateY(1px); }

    .btn.secondary{
      background: rgba(255,255,255,0.92);
      color: #0b1220;
      box-shadow: 0 16px 28px rgba(0,0,0,.22);
    }

    /* Malý tip (na mobilu schovaný) */
    .hint{
      position:absolute;
      bottom: calc(env(safe-area-inset-bottom) + 78px);
      left: 0; right: 0;
      text-align:center;
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      pointer-events:none;
    }
    @media (min-width: 800px){
      canvas{ width: min(980px, 100vw); border-radius: 16px; }
      .hint{ display:block; }
    }
  </style>
</head>
<body>
  <div class="gameShell">
    <!-- Canvas vnitøní rozlišení se nastaví JS podle devicePixelRatio -->
    <canvas id="game" aria-label="Hra Kralicek"></canvas>

    <div class="hud">
      <div class="pill"><b>Skore:</b> <span id="score">0</span> &nbsp;|&nbsp; <b>Mrkve:</b> <span id="carrots">0</span></div>
      <div class="right">
        <div class="pill"><b>Nejlepsi:</b> <span id="best">0</span></div>
      </div>
    </div>

    <div class="hint">Tap kdekoliv = skok</div>

    <div class="controls">
      <button class="btn secondary" id="restart">Restart</button>
      <button class="btn" id="jumpBtn">Skok</button>
    </div>
  </div> 

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha: true });

  const elScore = document.getElementById("score");
  const elCarrots = document.getElementById("carrots");
  const elBest = document.getElementById("best");
  const btnRestart = document.getElementById("restart");
  const btnJump = document.getElementById("jumpBtn");

  // --- “Virtuální” herní svìt (logické souøadnice) ---
  // Budeme kreslit do WORLD (960×420) a canvas jen škálovat podle obrazovky.
  const WORLD = { w: 960, h: 420 };
  const GROUND_Y = 320;

  // Fyzika / obtížnost
  const GRAVITY = 2100;
  const JUMP_V = 820;
  const BASE_SPEED = 360;
  const SPEED_GROW = 12;
  const SPAWN_MIN = 0.75;
  const SPAWN_MAX = 1.45;
  const CARROT_CHANCE = 0.55;
  const DOUBLE_JUMP = false;

  // Retina / resize
  function resize() {
    // Udržíme aspect ratio WORLD, aby se hra nedeformovala.
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    const cssW = window.innerWidth;
    const cssH = window.innerHeight;

    const scale = Math.min(cssW / WORLD.w, cssH / WORLD.h);
    const dispW = Math.floor(WORLD.w * scale);
    const dispH = Math.floor(WORLD.h * scale);

    canvas.style.width = dispW + "px";
    canvas.style.height = dispH + "px";

    canvas.width = Math.floor(WORLD.w * dpr);
    canvas.height = Math.floor(WORLD.h * dpr);

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // kreslíme v WORLD jednotkách
  }

  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", resize);

  // Zabránit scrollu při gestu na iOS/Safari
  document.addEventListener("touchmove", (e) => e.preventDefault(), { passive: false });

  // Best score
  const bestKey = "rabbit_best_v2_mobile";
  let best = Number(localStorage.getItem(bestKey) || 0);
  elBest.textContent = best;

  // Stav
  let running = false;
  let gameOver = false;
  let tPrev = performance.now();

  let score = 0;
  let carrots = 0;
  let speed = BASE_SPEED;
  let bg1 = 0, bg2 = 0;

  const obstacles = [];
  const particles = [];

  const rabbit = {
    x: 170,
    y: GROUND_Y - 52,
    w: 56,
    h: 52,
    vy: 0,
    onGround: true,
    canDouble: false,
    blink: 0,
  };

  let spawnTimer = rand(SPAWN_MIN, SPAWN_MAX);

  function reset() {
    running = false;
    gameOver = false;
    score = 0;
    carrots = 0;
    speed = BASE_SPEED;
    obstacles.length = 0;
    particles.length = 0;
    bg1 = 0; bg2 = 0;
    rabbit.y = GROUND_Y - rabbit.h;
    rabbit.vy = 0;
    rabbit.onGround = true;
    rabbit.canDouble = false;
    rabbit.blink = 0;
    spawnTimer = rand(SPAWN_MIN, SPAWN_MAX);
    elScore.textContent = score;
    elCarrots.textContent = carrots;
    draw();
  }

  function start() {
    if (gameOver) reset();
    running = true;
  }

  // Ovládání: tap kdekoliv do hry + tlaèítko
  function jump() {
    if (!running && !gameOver) start();
    if (gameOver) { reset(); start(); return; }

    if (rabbit.onGround) {
      rabbit.vy = -JUMP_V;
      rabbit.onGround = false;
      rabbit.canDouble = DOUBLE_JUMP;
      puff(rabbit.x + rabbit.w*0.25, GROUND_Y - 6, 10);
    } else if (DOUBLE_JUMP && rabbit.canDouble) {
      rabbit.vy = -JUMP_V * 0.9;
      rabbit.canDouble = false;
      puff(rabbit.x + rabbit.w*0.25, rabbit.y + rabbit.h, 8);
    }
  }

  // Pointer events fungují pro myš i touch
  canvas.addEventListener("pointerdown", (e) => { e.preventDefault(); jump(); }, { passive: false });
  btnJump.addEventListener("pointerdown", (e) => { e.preventDefault(); jump(); }, { passive: false });

  btnRestart.addEventListener("click", () => { reset(); start(); });

  window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); jump(); }
    if (e.key.toLowerCase() === "r") { reset(); start(); }
  }, { passive:false });

  // Spawn
  function spawnEntity() {
    const isCarrot = Math.random() < CARROT_CHANCE;
    if (isCarrot) {
      const band = Math.random();
      const y = band < 0.35 ? (GROUND_Y - 50)
              : band < 0.75 ? (GROUND_Y - 110)
              : (GROUND_Y - 160);
      obstacles.push({
        type: "carrot",
        x: WORLD.w + 40,
        y,
        w: 26,
        h: 46,
        passed: false,
        spin: Math.random() * Math.PI * 2
      });
    } else {
      const size = 34 + Math.random() * 26;
      obstacles.push({
        type: "rock",
        x: WORLD.w + 40,
        y: GROUND_Y - size + 8,
        w: size * 1.25,
        h: size,
        passed: false
      });
    }
  }

  // Kolize
  function aabb(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function puff(x, y, n=12) {
    for (let i=0;i<n;i++){
      const ang = Math.random()*Math.PI*2;
      const sp = 80 + Math.random()*200;
      particles.push({ x, y, vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp - 80, life: 0.55 + Math.random()*0.25 });
    }
  }

  function sparkle(x, y, n=14) {
    for (let i=0;i<n;i++){
      const ang = (-Math.PI/2) + (Math.random()*Math.PI);
      const sp = 120 + Math.random()*260;
      particles.push({ x, y, vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp - 120, life: 0.6 + Math.random()*0.3 });
    }
  }

  function die() {
    gameOver = true;
    running = false;
    rabbit.blink = 1.2;
    puff(rabbit.x + rabbit.w*0.6, rabbit.y + rabbit.h*0.9, 20);

    if (score > best) {
      best = score;
      localStorage.setItem(bestKey, String(best));
      elBest.textContent = best;
    }
  }

  // Kreslení
  function roundRect(x, y, w, h, r, fill, stroke) {
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr);
    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  function drawGround() {
    ctx.fillStyle = "rgba(60,40,20,0.10)";
    ctx.fillRect(0, GROUND_Y, WORLD.w, WORLD.h - GROUND_Y);

    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y+0.5);
    ctx.lineTo(WORLD.w, GROUND_Y+0.5);
    ctx.stroke();

    ctx.fillStyle = "rgba(20,120,60,0.18)";
    for (let i=0;i<90;i++){
      const x = (i*60 + (bg1*0.6)) % (WORLD.w+60) - 30;
      const y = GROUND_Y + 16 + (i%3)*10;
      ctx.fillRect(x, y, 3, 8);
    }
  }

  function cloud(x,y,s){
    ctx.beginPath();
    ctx.arc(x, y, s*0.35, 0, Math.PI*2);
    ctx.arc(x+s*0.30, y-10, s*0.40, 0, Math.PI*2);
    ctx.arc(x+s*0.65, y, s*0.33, 0, Math.PI*2);
    ctx.arc(x+s*0.35, y+10, s*0.38, 0, Math.PI*2);
    ctx.fill();
  }

  function drawClouds() {
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    for (let i=0;i<6;i++){
      const x = (i*220 - bg2) % (WORLD.w+260) - 60;
      const y = 50 + (i%3)*18;
      cloud(x,y, 58 + (i%2)*10);
    }
  }

  function hillLayer(par, fill, step, baseY) {
    ctx.fillStyle = fill;
    ctx.beginPath();
    const offset = (bg1*par) % step;
    ctx.moveTo(-step + offset, baseY);
    for (let x=-step; x<=WORLD.w+step; x+=step) {
      const xx = x + offset;
      const h = 40 + 30*Math.sin((xx+100)*0.01) + 18*Math.sin((xx+200)*0.02);
      ctx.quadraticCurveTo(xx+step*0.5, baseY - h, xx+step, baseY);
    }
    ctx.lineTo(WORLD.w+step, GROUND_Y);
    ctx.lineTo(-step, GROUND_Y);
    ctx.closePath();
    ctx.fill();
  }

  function drawHills() {
    hillLayer(0.12, "rgba(40,160,120,0.22)", 250, 150);
    hillLayer(0.07, "rgba(40,120,160,0.18)", 320, 190);
  }

  function drawRabbit() {
    const {x,y,w,h} = rabbit;

    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.beginPath();
    ctx.ellipse(x+w*0.5, GROUND_Y+10, w*0.43, 10, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#ffffff";
    roundRect(x, y, w, h, 14, true, false);

    ctx.fillStyle = "#ffffff";
    roundRect(x+w*0.10, y-26, w*0.18, 34, 10, true, false);
    roundRect(x+w*0.32, y-30, w*0.18, 38, 10, true, false);
    ctx.fillStyle = "rgba(255,120,160,0.45)";
    roundRect(x+w*0.14, y-18, w*0.10, 22, 8, true, false);
    roundRect(x+w*0.36, y-22, w*0.10, 26, 8, true, false);

    const eyeY = y + h*0.38;
    ctx.fillStyle = "#111";
    if (rabbit.blink <= 0) {
      ctx.beginPath();
      ctx.arc(x+w*0.66, eyeY, 3.2, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.strokeStyle = "#111";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(x+w*0.62, eyeY);
      ctx.lineTo(x+w*0.70, eyeY);
      ctx.stroke();
    }

    ctx.fillStyle = "rgba(255,120,160,0.85)";
    ctx.beginPath();
    ctx.arc(x+w*0.76, y+h*0.52, 3.5, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "rgba(0,0,0,0.06)";
    roundRect(x+w*0.18, y+h*0.72, w*0.20, h*0.22, 10, true, false);
    roundRect(x+w*0.42, y+h*0.74, w*0.22, h*0.20, 10, true, false);
  }

  function drawRock(o) {
    ctx.fillStyle = "rgba(60,60,70,0.85)";
    roundRect(o.x, o.y, o.w, o.h, 12, true, false);
    ctx.fillStyle = "rgba(255,255,255,0.10)";
    for (let i=0;i<4;i++){
      ctx.fillRect(o.x + 10 + i*18, o.y + 10 + (i%2)*12, 10, 4);
    }
  }

  function drawCarrot(o) {
    ctx.save();
    ctx.translate(o.x + o.w/2, o.y + o.h/2);
    ctx.rotate(Math.sin(o.spin)*0.15);
    ctx.translate(-o.w/2, -o.h/2);

    ctx.fillStyle = "rgba(30,160,90,0.95)";
    ctx.beginPath();
    ctx.moveTo(o.w*0.5, 0);
    ctx.quadraticCurveTo(o.w*0.1, o.h*0.18, o.w*0.28, o.h*0.22);
    ctx.quadraticCurveTo(o.w*0.5, o.h*0.06, o.w*0.5, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(o.w*0.5, 0);
    ctx.quadraticCurveTo(o.w*0.9, o.h*0.18, o.w*0.72, o.h*0.22);
    ctx.quadraticCurveTo(o.w*0.5, o.h*0.06, o.w*0.5, 0);
    ctx.fill();

    ctx.fillStyle = "rgba(255,140,40,0.95)";
    roundRect(2, 10, o.w-4, o.h-12, 10, true, false);

    ctx.fillStyle = "rgba(255,255,255,0.18)";
    for (let i=0;i<4;i++){
      const yy = 18 + i*9;
      ctx.fillRect(6, yy, o.w-12, 2.3);
    }
    ctx.restore();
  }

  function drawParticles(dt) {
    for (let i=particles.length-1; i>=0; i--){
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) { particles.splice(i,1); continue; }
      p.vy += 1200*dt;
      p.x += p.vx*dt;
      p.y += p.vy*dt;

      const a = clamp(p.life, 0, 1);
      ctx.fillStyle = `rgba(255,255,255,${0.35*a})`;
      ctx.fillRect(p.x, p.y, 3, 3);
    }
  }

  function banner(title, subtitle) {
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    roundRect(WORLD.w*0.18, WORLD.h*0.18, WORLD.w*0.64, WORLD.h*0.26, 18, true, false);

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "700 34px system-ui, -apple-system, Segoe UI, Roboto, Arial";
    ctx.fillText(title, WORLD.w/2, WORLD.h*0.30);

    ctx.font = "500 16px system-ui, -apple-system, Segoe UI, Roboto, Arial";
    ctx.globalAlpha = 0.95;
    ctx.fillText(subtitle, WORLD.w/2, WORLD.h*0.36);
    ctx.restore();
  }

  function drawOverlay() {
    if (!running && !gameOver) banner("Tapni pro start", "Tap kdekoliv = skok • Sbirej mrkve");
    if (gameOver) banner("Konec hry!", "Tap / Skok pro restart");
  }

  function draw() {
    ctx.clearRect(0,0,WORLD.w, WORLD.h);
    drawClouds();
    drawHills();
    drawGround();

    for (const o of obstacles) {
      if (o.type === "rock") drawRock(o);
      else drawCarrot(o);
    }
    drawRabbit();
    drawOverlay();
  }

  function update(dt) {
    if (running && !gameOver) {
      speed = BASE_SPEED + (score/120)*SPEED_GROW + carrots*2.0;

      bg1 = (bg1 + speed*0.20*dt) % (WORLD.w+120);
      bg2 = (bg2 + speed*0.08*dt) % (WORLD.w+240);

      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnEntity();
        spawnTimer = rand(SPAWN_MIN, SPAWN_MAX) * clamp(1.0 - score/2000, 0.55, 1.0);
      }

      rabbit.vy += GRAVITY * dt;
      rabbit.y += rabbit.vy * dt;

      if (rabbit.y >= GROUND_Y - rabbit.h) {
        rabbit.y = GROUND_Y - rabbit.h;
        rabbit.vy = 0;
        rabbit.onGround = true;
        rabbit.canDouble = DOUBLE_JUMP;
      } else {
        rabbit.onGround = false;
      }

      for (let i=obstacles.length-1; i>=0; i--){
        const o = obstacles[i];
        o.x -= speed * dt;
        if (o.type === "carrot") o.spin += dt*4;

        if (o.x + o.w < -80) {
          obstacles.splice(i,1);
          continue;
        }

        if (o.type === "rock" && !o.passed && o.x + o.w < rabbit.x) {
          o.passed = true;
          score += 10;
          elScore.textContent = score;
        }

        if (o.type === "rock") {
          if (aabb(rabbit, o)) die();
        } else {
          if (aabb(rabbit, o)) {
            obstacles.splice(i,1);
            carrots += 1;
            score += 25;
            elCarrots.textContent = carrots;
            elScore.textContent = score;
            sparkle(rabbit.x + rabbit.w*0.8, rabbit.y + rabbit.h*0.35, 16);
          }
        }
      }
    }

    if (rabbit.blink > 0) rabbit.blink -= dt;
    drawParticles(dt);
  }

  function loop(now) {
    const dt = clamp((now - tPrev) / 1000, 0, 0.033);
    tPrev = now;

    draw();
    update(dt);

    requestAnimationFrame(loop);
  }

  function rand(a,b){ return a + Math.random()*(b-a); }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

  // Start
  resize();
  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>

</html>
